worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # WSL to Windows Host Bridge: 127.0.0.1
    # We use the IP directly to ensure there is no confusion with upstreams.

    server {
        listen       80;
        server_name  localhost;

        # Frontend: Flutter Web App
        location / {
            root   /var/www/html;
            index  index.nginx-debian.html;
            try_files $uri $uri/ /index.nginx-debian.html;
        }

        # API Gateway (Port 8003)
        location /api/v1/login {
            proxy_pass http://127.0.0.1:8003;
        }

        # GitHub Service (Port 8001 + WebSockets)
        location /api/v1/github {
            proxy_pass http://127.0.0.1:8001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Vault Service (Port 8002)
        location /api/v1/vault {
            proxy_pass http://127.0.0.1:8002;
        }

        # LLM Service (Port 8004)
        location /api/v1/llm {
            proxy_pass http://127.0.0.1:8004;
        }

        # Agent-1 Reasoning (Port 8005)
        location /api/v1/ai {
            proxy_pass http://127.0.0.1:8005;
        }

        # Cluster Guardian (Port 8006)
        location /api/v1/guardian {
            proxy_pass http://127.0.0.1:8006;
        }

        # Metrics Service (Port 8008)
        location /api/v1/metrics {
            proxy_pass http://127.0.0.1:8008;
        }

        # WebSocket Events (Port 8009)
        location /api/v1/ws/events {
            proxy_pass http://127.0.0.1:8009;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Specialized Log WebSocket (Main Server - Port 8000)
        location /api/v1/ws/logs/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # WebSocket Monitor/Generic (Main Server - Port 8000)
        location /api/v1/ws/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }

        # Default fallback to Backend Server (Port 8000)
        location /api/v1/ {
            proxy_pass http://127.0.0.1:8000;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
